name: Botón de Pánico - Limpieza de Pruebas
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  limpieza:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Operación Limpieza
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Traer todo de la nube
          git fetch origin
          
          # 2. Saltamos a la rama de pruebas (usando minúsculas)
          git checkout main-pruebas || git checkout -b main-pruebas
          
          # 3. Resetear usando la rama 'main' como fuente
          git reset --hard origin/main
          
          # 4. Limpiar basura
          git clean -fd
          
          # 5. Subir cambios
          git push origin main-pruebas --force