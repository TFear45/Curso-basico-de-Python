name: Botón de Pánico - Limpieza de Pruebas
on:
  schedule:
    - cron: '0 0 * * *' # Medianoche
  workflow_dispatch:      # Permite el botón manual

jobs:
  limpieza:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Trae todo el historial

      - name: Configurar Bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Operación Limpieza
        run: |
          # 1. Asegurarnos de estar en la rama de pruebas
          git checkout Main-Pruebas
          
          # 2. Traer lo más nuevo de Main (la versión oficial)
          git fetch origin Main
          
          # 3. Forzar a que la rama de pruebas sea IGUAL a Main
          git reset --hard origin/Main
          
          # 4. Eliminar archivos creados por alumnos
          git clean -fd
          
          # 5. ¡SUBIR A LA FUERZA! (Esto limpia la nube)
          git push origin Main-Pruebas --force