name: Botón de Pánico - Limpieza de Pruebas
on:
  schedule:
    - cron: '0 0 * * *' # Medianoche
  workflow_dispatch:      # Permite el botón manual

jobs:
  limpieza:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Trae todo el historial

      - name: Configurar Bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

     - name: Operación Limpieza
        run: |
          # 1. Configurar identidad (por si acaso)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Traer TODA la información de las ramas de la nube
          git fetch origin
          
          # 3. Forzar el cambio a la rama de pruebas (creándola si no existe en el contenedor)
          git checkout Main-Pruebas || git checkout -b Main-Pruebas
          
          # 4. Resetear al estado de Main
          git reset --hard origin/Main
          
          # 5. Limpiar archivos basura
          git clean -fd
          
          # 6. Subir a la fuerza para limpiar la web
          git push origin Main-Pruebas --force